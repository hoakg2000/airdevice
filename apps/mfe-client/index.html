<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ngân Hàng XYZ - eKYC Portal</title>
  <style>
    body { background-color: #f0f2f5; font-family: sans-serif; padding: 2rem; }
    .container { display: flex; gap: 2rem; max-width: 1200px; margin: 0 auto; }
    .ekyc-form { flex: 1; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .result-panel { flex: 1; }
    #captured-result { max-width: 100%; border-radius: 8px; border: 2px solid #10b981; display: none; }
  </style>
</head>
<body>
  
  <div class="container">
    <div class="ekyc-form">
      <h2>Mở Tài Khoản Ngân Hàng</h2>
      <p>Vui lòng quét mã QR bằng điện thoại để dùng Camera chụp CMND.</p>
      
      <air-device></air-device>
      
    </div>

    <div class="result-panel">
      <h3>Kết Quả Trích Xuất</h3>
      <img id="captured-result" alt="CMND Captured" />
    </div>
  </div>

  <script type="module" src="/src/main.tsx"></script>

  <script>
    // Khách hàng chỉ cần lắng nghe đúng Event này, không cần biết WebRTC là cái gì!
    window.addEventListener('air-device-frame-captured', (event) => {
      const imgElement = document.getElementById('captured-result');
      
      // Lấy chuỗi Base64 từ Event
      const base64Image = event.detail.imageBase64;
      
      // Gán vào thẻ img để hiển thị
      imgElement.src = base64Image;
      imgElement.style.display = 'block';

      console.log('✅ Host App đã nhận được ảnh thành công! Kích thước Base64:', base64Image.length);
      // Ở hệ thống thực tế, khách hàng sẽ lấy Base64 này gửi lên API AI OCR của họ.
    });
  </script>
</body>
</html>

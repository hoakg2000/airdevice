# docker/redis/redis.conf

# Chỉ bind các IP nội bộ trong mạng Docker, tăng tính bảo mật
bind 0.0.0.0
protected-mode no
port 6379

# TCP keepalive để phát hiện và ngắt các kết nối WSS/Backend bị treo
tcp-keepalive 300

# Giới hạn RAM tối đa cho Redis (ví dụ: 256MB là quá đủ cho hàng chục ngàn session)
maxmemory 256mb

# CỰC KỲ QUAN TRỌNG: Policy khi đầy RAM. 
# allkeys-lru: Xóa các key ít được truy cập nhất gần đây. 
# Đảm bảo hệ thống không bao giờ bị crash vì lỗi OOM.
maxmemory-policy allkeys-lru

# Tắt lưu trữ xuống ổ cứng (RDB/AOF) vì State của WebRTC session là Ephemeral (phù du).
# Khi server restart, các session cũ mất đi cũng không sao, client sẽ tự reconnect.
save ""
appendonly no